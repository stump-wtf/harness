# harness — Gitea CI (PRIMARY host). Go correctness gate: gofmt, vet, build,
# test, and the race detector. Mirrors switchboard's ci.yaml shape. Foundation
# story #5: static analysis (go vet), formatting enforcement (gofmt), and a
# test runner with race detection, on every PR.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          # Exclude vendor/: third-party sources are not ours to reformat.
          # go vet/build/test already ignore vendor in module mode.
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -v '^vendor/'))
          if [ -n "$unformatted" ]; then echo "unformatted:"; echo "$unformatted"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...
      - name: test (race)
        # Foundation is pure (config parser + state machine), but the daemon,
        # supervisor, and protocol/attach packages that land next are built on
        # goroutines, PTYs, and channels — so the race detector guards the whole
        # module in CI from the start (SPEC-0002/0003). -race needs cgo, hence a
        # C compiler on the runner.
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...
